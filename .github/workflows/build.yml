name: Build HaiLockGlassClock Roothide

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e

          echo "Install ldid"
          brew update
          brew install ldid || true

          echo "Check ldid"
          which ldid
          ldid -v || true

      - name: Setup roothide theos manually
        run: |
          set -e

          echo "Remove old theos if exists"
          rm -rf "$HOME/theos"

          echo "Clone roothide/theos"
          git clone --recursive https://github.com/roothide/theos.git "$HOME/theos"

          echo "Clone Theos SDKs"
          rm -rf "$HOME/theos/sdks"
          git clone --depth=1 https://github.com/theos/sdks.git "$HOME/theos/sdks"

          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"
          echo "$HOME/theos/bin" >> "$GITHUB_PATH"

          echo "Check Theos"
          ls -la "$HOME/theos"
          ls -la "$HOME/theos/sdks"

      - name: Add Preferences framework stub
        run: |
          set -e

          echo "Creating Preferences.framework stub in all iPhoneOS SDKs"

          for SDK in "$HOME"/theos/sdks/iPhoneOS*.sdk; do
            if [ -d "$SDK" ]; then
              PREF_DIR="$SDK/System/Library/PrivateFrameworks/Preferences.framework"
              mkdir -p "$PREF_DIR"

              printf '%s\n' \
                '--- !tapi-tbd-v3' \
                'archs:           [ arm64, arm64e ]' \
                'platform:        ios' \
                'install-name:    /System/Library/PrivateFrameworks/Preferences.framework/Preferences' \
                'exports:' \
                '  - archs:           [ arm64, arm64e ]' \
                '    objc-classes:    [ PSListController, PSSpecifier ]' \
                '...' \
                > "$PREF_DIR/Preferences.tbd"

              echo "Added stub: $PREF_DIR/Preferences.tbd"
            fi
          done

          find "$HOME/theos/sdks" -path "*Preferences.framework*" -print

      - name: Build package
        run: |
          export THEOS="$HOME/theos"
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"

          which ldid
          make clean
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=roothide messages=yes

      - name: List packages
        run: |
          ls -la
          ls -la packages || true

      - name: Upload deb file
        uses: actions/upload-artifact@v4
        with:
          name: HaiLockGlassClock-roothide-deb
          path: packages/*.deb
